<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0288d1"/>
      <stop offset="100%" style="stop-color:#01579b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- A — left, white, slightly larger as anchor letter -->
  <text x="18" y="68"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="58" font-weight="900"
        fill="#ffffff"
        opacity="1">A</text>

  <!-- Q — overlapping right, light blue so it reads as secondary -->
  <text x="46" y="72"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="52" font-weight="900"
        fill="#ffffff"
        opacity="0.45">Q</text>

  <!-- Thin underline accent -->
  <rect x="14" y="76" width="72" height="3" rx="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
